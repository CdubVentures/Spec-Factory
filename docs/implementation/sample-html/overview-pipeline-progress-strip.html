<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Overview Pipeline Progress Strip Sample</title>
  <style>
    :root {
      color-scheme: light;
      --surface: #f5f7fb;
      --panel: #ffffff;
      --line: #d8dee8;
      --line-soft: #e8edf4;
      --text: #111827;
      --muted: #667085;
      --accent: #2563eb;
      --success: #16a34a;
      --danger: #dc2626;
      --skip: #98a2b3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--surface);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .frame {
      width: min(1040px, calc(100vw - 48px));
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 44px rgb(15 23 42 / 0.08);
      overflow: hidden;
    }

    table {
      width: 100%;
      table-layout: fixed;
      border-collapse: collapse;
      font-size: 12px;
    }

    thead th {
      height: 34px;
      padding: 0 8px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-align: left;
      text-transform: uppercase;
    }

    tbody tr {
      height: 72px;
      border-bottom: 1px solid var(--line-soft);
    }

    tbody tr:last-child { border-bottom: 0; }

    td {
      position: relative;
      padding: 0 8px;
      vertical-align: middle;
      white-space: nowrap;
      overflow: hidden;
    }

    .select { width: 48px; text-align: center; }
    .brand { width: 120px; overflow: visible; }
    .base { width: 170px; }
    .variant { width: 170px; }
    .family { width: 50px; text-align: center; }
    .gap { width: 40px; }
    .module { width: 110px; color: var(--muted); }

    .identity-text {
      display: inline-block;
      transform: translateY(-2px);
    }

    .pipeline-strip {
      position: absolute;
      left: 8px;
      bottom: 6px;
      width: 510px;
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 3px;
      pointer-events: none;
      z-index: 4;
    }

    .stage {
      position: relative;
      height: 10px;
      min-width: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 3px;
      background: #f8fafc;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      width: 0;
      background: var(--accent);
      transition: width 180ms ease;
    }

    .stage.running::before {
      width: 56%;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .stage.done::before { width: 100%; background: var(--success); }
    .stage.error::before { width: 100%; background: var(--danger); }
    .stage.skipped::before { width: 100%; background: var(--skip); opacity: 0.45; }

    .stage span {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 0 2px;
      color: var(--muted);
      font-size: 8px;
      font-weight: 800;
      line-height: 1;
      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .stage.running span,
    .stage.done span,
    .stage.error span,
    .stage.skipped span {
      color: #fff;
      text-shadow: 0 1px 2px rgb(15 23 42 / 0.42);
    }

    .cell-chip {
      display: inline-flex;
      width: 72px;
      height: 24px;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 5px;
      color: var(--muted);
      background: #fbfcff;
      font-size: 11px;
      font-weight: 700;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.9; }
      50% { opacity: 0.45; }
    }
  </style>
</head>
<body>
  <div class="frame">
    <table aria-label="Overview pipeline progress strip sample">
      <colgroup>
        <col class="select">
        <col class="brand">
        <col class="base">
        <col class="variant">
        <col class="family">
        <col class="gap">
        <col class="module">
        <col class="module">
        <col class="module">
      </colgroup>
      <thead>
        <tr>
          <th></th>
          <th>Brand</th>
          <th>Base Model</th>
          <th>Variant</th>
          <th>Family</th>
          <th></th>
          <th>CEF</th>
          <th>PIF</th>
          <th>Keys</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="select"><input type="checkbox" checked></td>
          <td class="brand">
            <span class="identity-text">Corsair</span>
            <div class="pipeline-strip" aria-label="Running pipeline progress">
              <div class="stage done"><span>CEF</span></div>
              <div class="stage done"><span>DP</span></div>
              <div class="stage running"><span>PIF</span></div>
              <div class="stage"><span>Eval</span></div>
              <div class="stage done"><span>RDF</span></div>
              <div class="stage done"><span>SKU</span></div>
              <div class="stage running"><span>KF</span></div>
            </div>
          </td>
          <td><span class="identity-text">M75</span></td>
          <td><span class="identity-text">Wireless</span></td>
          <td>3</td>
          <td></td>
          <td><span class="cell-chip">2/2</span></td>
          <td><span class="cell-chip">Loop</span></td>
          <td><span class="cell-chip">24/41</span></td>
        </tr>
        <tr>
          <td class="select"><input type="checkbox" checked></td>
          <td class="brand">
            <span class="identity-text">Logitech</span>
            <div class="pipeline-strip" aria-label="Completed pipeline progress">
              <div class="stage done"><span>CEF</span></div>
              <div class="stage done"><span>DP</span></div>
              <div class="stage done"><span>PIF</span></div>
              <div class="stage done"><span>Eval</span></div>
              <div class="stage done"><span>RDF</span></div>
              <div class="stage done"><span>SKU</span></div>
              <div class="stage done"><span>KF</span></div>
            </div>
          </td>
          <td><span class="identity-text">G Pro X</span></td>
          <td><span class="identity-text">Superlight 2</span></td>
          <td>5</td>
          <td></td>
          <td><span class="cell-chip">2/2</span></td>
          <td><span class="cell-chip">Eval</span></td>
          <td><span class="cell-chip">41/41</span></td>
        </tr>
        <tr>
          <td class="select"><input type="checkbox" checked></td>
          <td class="brand">
            <span class="identity-text">Razer</span>
            <div class="pipeline-strip" aria-label="Blocked pipeline progress">
              <div class="stage done"><span>CEF</span></div>
              <div class="stage error"><span>DP</span></div>
              <div class="stage skipped"><span>PIF</span></div>
              <div class="stage skipped"><span>Eval</span></div>
              <div class="stage done"><span>RDF</span></div>
              <div class="stage done"><span>SKU</span></div>
              <div class="stage skipped"><span>KF</span></div>
            </div>
          </td>
          <td><span class="identity-text">Viper</span></td>
          <td><span class="identity-text">V3 Pro</span></td>
          <td>4</td>
          <td></td>
          <td><span class="cell-chip">2/2</span></td>
          <td><span class="cell-chip">Blocked</span></td>
          <td><span class="cell-chip">18/39</span></td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
