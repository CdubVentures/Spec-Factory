# /etc/searxng/settings.yml
use_default_settings:
  engines:
    keep_only:
      - google
      - bing
      - startpage
      - duckduckgo
      - brave

engines:
  - name: google
    engine: google
    shortcut: go
    disabled: false
  - name: bing
    engine: bing
    shortcut: bi
    disabled: false
  - name: startpage
    engine: startpage
    shortcut: sp
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
  - name: brave
    engine: brave
    shortcut: br
    disabled: false

outgoing:
  request_timeout: 10.0
  enable_http2: false
  proxies:
    "all://":
      - http://zruyrjpq-rotate:dfm4udpzx5p0@p.webshare.io:80

general:
  instance_name: "Spec Harvester Local Search"
  debug: true
  enable_metrics: true
  open_metrics: ""   # set a password to enable /metrics with basic auth

search:
  safe_search: 0
  autocomplete: ""
  formats:
    - html
    - json

server:
  bind_address: "127.0.0.1"
  port: 8888
  base_url: false
  secret_key: "CHANGE_THIS_TO_A_RANDOM_LONG_SECRET"
  limiter: false
  public_instance: false
  image_proxy: false
  method: "GET"   # or "POST"
